<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid 12 colunas</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .item {
      background: #9aaab3;
      color: #000;
      text-align: center;
      padding: 20px 0;
      font-weight: bold;
    }

    .col-1  { grid-column: span 1; }
    .col-2  { grid-column: span 2; }
    .col-3  { grid-column: span 3; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-12 { grid-column: span 12; }
  </style>
</head>
<body>
  <div class="container">
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>
    <div class="item col-1">1</div>

    <div class="item col-2">2</div>
    <div class="item col-2">2</div>
    <div class="item col-2">2</div>
    <div class="item col-2">2</div>
    <div class="item col-2">2</div>
    <div class="item col-2">2</div>

    <div class="item col-3">3</div>
    <div class="item col-3">3</div>
    <div class="item col-3">3</div>
    <div class="item col-3">3</div>

    <div class="item col-4">4</div>
    <div class="item col-4">4</div>
    <div class="item col-4">4</div>

    <div class="item col-6">6</div>
    <div class="item col-6">6</div>

    <div class="item col-4">4</div>
    <div class="item col-8">8</div>

    <div class="item col-12">12</div>
  </div>
</body>
</html>
